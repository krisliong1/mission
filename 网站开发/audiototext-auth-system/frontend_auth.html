<!-- frontend_auth.html - Login/Register Modal Component -->
<!-- Include this in your main HTML page -->

<!-- ── Styles ─────────────────────────────────────────────────────────────── -->
<style>
  /* Modal Overlay */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.active { display: flex; }

  /* Modal Card */
  .auth-modal {
    background: #ffffff;
    border-radius: 16px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.15);
    position: relative;
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(-12px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .auth-modal h2 {
    margin: 0 0 8px;
    font-size: 24px;
    font-weight: 700;
    color: #111;
  }
  .auth-modal .subtitle {
    color: #666;
    font-size: 14px;
    margin-bottom: 28px;
  }

  /* Close button */
  .modal-close {
    position: absolute;
    top: 16px; right: 16px;
    background: none; border: none;
    font-size: 20px; cursor: pointer;
    color: #999; line-height: 1;
  }
  .modal-close:hover { color: #333; }

  /* Form fields */
  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: #444;
    margin-bottom: 6px;
  }
  .form-group input {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    font-size: 14px;
    transition: border-color 0.2s;
    box-sizing: border-box;
  }
  .form-group input:focus {
    outline: none;
    border-color: #6366f1;
  }
  .form-group input.error { border-color: #ef4444; }
  .field-error { color: #ef4444; font-size: 12px; margin-top: 4px; }

  /* Checkbox row */
  .checkbox-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    margin-bottom: 20px;
  }
  .checkbox-row input[type="checkbox"] { margin-top: 2px; }
  .checkbox-row label { font-size: 13px; color: #555; }
  .checkbox-row a { color: #6366f1; text-decoration: none; }

  /* Buttons */
  .btn-primary {
    width: 100%;
    padding: 12px;
    background: #6366f1;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .btn-primary:hover { background: #4f46e5; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { background: #a5b4fc; cursor: not-allowed; }

  .btn-google {
    width: 100%;
    padding: 11px;
    background: white;
    color: #333;
    border: 1.5px solid #e0e0e0;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background 0.2s;
    margin-bottom: 16px;
  }
  .btn-google:hover { background: #f8f8f8; }

  .divider {
    text-align: center;
    color: #aaa;
    font-size: 12px;
    margin: 16px 0;
    position: relative;
  }
  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40%;
    height: 1px;
    background: #e0e0e0;
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }

  .auth-footer {
    text-align: center;
    font-size: 13px;
    color: #666;
    margin-top: 20px;
  }
  .auth-footer a { color: #6366f1; text-decoration: none; font-weight: 500; }

  /* Error/success banner */
  .auth-banner {
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
  }
  .auth-banner.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; display: block; }
  .auth-banner.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; display: block; }
</style>

<!-- ── Login Modal ─────────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="loginModal">
  <div class="auth-modal" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
    <button class="modal-close" onclick="closeModal('loginModal')" aria-label="Close">✕</button>
    <h2 id="loginTitle">Welcome back</h2>
    <p class="subtitle">Sign in to your OskrisTranscribe account</p>

    <div class="auth-banner" id="loginBanner"></div>

    <button class="btn-google" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.826.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/></svg>
      Sign in with Google
    </button>

    <div class="divider">or</div>

    <form id="loginForm" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="loginPassword">
          Password
          <a href="#" style="float:right;color:#6366f1;font-size:12px;font-weight:400;" onclick="showForgotPassword()">Forgot password?</a>
        </label>
        <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-primary" id="loginBtn">Sign in</button>
    </form>

    <p class="auth-footer">
      Don't have an account? <a href="#" onclick="switchModal('loginModal','registerModal')">Create one</a>
    </p>
  </div>
</div>

<!-- ── Register Modal ──────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="registerModal">
  <div class="auth-modal" role="dialog" aria-modal="true" aria-labelledby="registerTitle">
    <button class="modal-close" onclick="closeModal('registerModal')" aria-label="Close">✕</button>
    <h2 id="registerTitle">Create account</h2>
    <p class="subtitle">Start transcribing for free — no credit card needed</p>

    <div class="auth-banner" id="registerBanner"></div>

    <button class="btn-google" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.707c-.18-.54-.282-1.117-.282-1.707s.102-1.167.282-1.707V4.961H.957C.347 6.175 0 7.55 0 9s.348 2.826.957 4.039l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z"/></svg>
      Sign up with Google
    </button>

    <div class="divider">or</div>

    <form id="registerForm" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label for="registerName">Full name</label>
        <input type="text" id="registerName" placeholder="Your name" required autocomplete="name">
      </div>
      <div class="form-group">
        <label for="registerEmail">Email</label>
        <input type="email" id="registerEmail" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="registerPassword">Password</label>
        <input type="password" id="registerPassword" placeholder="Min. 8 characters" required minlength="8" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label for="registerConfirm">Confirm password</label>
        <input type="password" id="registerConfirm" placeholder="Repeat password" required autocomplete="new-password">
        <div class="field-error" id="confirmError"></div>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="termsCheck" required>
        <label for="termsCheck">
          I agree to the <a href="/terms" target="_blank">Terms of Service</a> and <a href="/privacy" target="_blank">Privacy Policy</a>
        </label>
      </div>
      <button type="submit" class="btn-primary" id="registerBtn">Create account</button>
    </form>

    <p class="auth-footer">
      Already have an account? <a href="#" onclick="switchModal('registerModal','loginModal')">Sign in</a>
    </p>
  </div>
</div>

<!-- ── JavaScript ──────────────────────────────────────────────────────────── -->
<script>
const API_BASE = '/api';

// ── Modal helpers ──────────────────────────────────────────────────────────
function openModal(id) {
  document.getElementById(id).classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeModal(id) {
  document.getElementById(id).classList.remove('active');
  document.body.style.overflow = '';
}
function switchModal(from, to) {
  closeModal(from);
  openModal(to);
}
// Close on overlay click
document.querySelectorAll('.modal-overlay').forEach(overlay => {
  overlay.addEventListener('click', e => {
    if (e.target === overlay) closeModal(overlay.id);
  });
});
// Escape key
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.querySelectorAll('.modal-overlay.active').forEach(m => closeModal(m.id));
});

function showBanner(modalPrefix, type, msg) {
  const el = document.getElementById(modalPrefix + 'Banner');
  el.className = 'auth-banner ' + type;
  el.textContent = msg;
}

// ── Login ──────────────────────────────────────────────────────────────────
async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  try {
    const res = await fetch(`${API_BASE}/auth/login`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('loginEmail').value,
        password: document.getElementById('loginPassword').value,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Login failed');

    localStorage.setItem('token', data.access_token);
    closeModal('loginModal');
    window.dispatchEvent(new Event('auth:login'));
    updateUserBar();
  } catch (err) {
    showBanner('login', 'error', err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Sign in';
  }
}

// ── Register ───────────────────────────────────────────────────────────────
async function handleRegister(e) {
  e.preventDefault();
  const pwd = document.getElementById('registerPassword').value;
  const confirm = document.getElementById('registerConfirm').value;

  if (pwd !== confirm) {
    document.getElementById('confirmError').textContent = 'Passwords do not match';
    return;
  }
  document.getElementById('confirmError').textContent = '';

  const btn = document.getElementById('registerBtn');
  btn.disabled = true;
  btn.textContent = 'Creating account…';

  try {
    const res = await fetch(`${API_BASE}/auth/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: document.getElementById('registerName').value,
        email: document.getElementById('registerEmail').value,
        password: pwd,
      }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Registration failed');

    localStorage.setItem('token', data.access_token);
    closeModal('registerModal');
    window.dispatchEvent(new Event('auth:login'));
    updateUserBar();
  } catch (err) {
    showBanner('register', 'error', err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Create account';
  }
}

// ── Google OAuth ──────────────────────────────────────────────────────────
function signInWithGoogle() {
  window.location.href = `${API_BASE}/auth/google`;
}

function showForgotPassword() {
  alert('Password reset email feature coming soon.');
}

// ── Token helpers ─────────────────────────────────────────────────────────
function getToken() { return localStorage.getItem('token'); }
function isLoggedIn() { return !!getToken(); }
function logout() {
  localStorage.removeItem('token');
  window.dispatchEvent(new Event('auth:logout'));
  updateUserBar();
}
</script>
